{{ define "main" }}
    <header class="gallery-info">
        <object class="logo" type="image/svg+xml" data="{{ site.Params.images_prefix }}/{{ .Params.logo }}">
            {{ .Title }}
        </object>
        <h3>{{ .Params.venue }} &mdash; {{ .Params.city }}</h3>
        <section class="gallery-info__credits">
            <span>Directed by {{ .Params.director }}</span>
            <span>Featuring Thomas as {{ .Params.role }}</span>
        </section>
        <p class="small">Photos by {{ .Params.photos_by }}</p>
    </header>
    <ul class="gallery">
        {{ range sort .Params.images "weight" }}
            <li class="gallery__item {{ .big }}">
                <a href="{{ site.Params.images_prefix }}/{{ .directus_files_id }}?key=full" data-caption="{{ .caption }}">
                    <img src="{{ site.Params.images_prefix }}/{{ .directus_files_id }}?key={{ .big }}" alt="{{ .caption }}">
                </a>
            </li>
        {{ end }}
    </ul>
    {{ .Content }}
{{ end }}
