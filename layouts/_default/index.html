{{ define "main" }}
  <div class="hero full-bleed">
    {{ readFile "/static/images/logo.svg" | safeHTML }}
    <img class="hero__image" src="{{ site.Params.assets_url }}/{{ site.Params.splash_image }}">
    <section class="hero__news">
      {{ range .Params.blocks }}
        {{ partial (printf "blocks/%s" .type) .data }}
      {{ end }}
    </section>
    <nav class="nav hero__nav">
      {{ partial "nav" . }}
    </nav>
  </div>
{{ end }}
